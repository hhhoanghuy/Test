<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đếm Từ và Ký Tự</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Đếm từ & ký tự</h2>

      <textarea
        id="textInput"
        maxlength="200"
        placeholder="Nhập tối đa 200 ký tự..."
      ></textarea>

      <div id="wordCount">Số từ: 0</div>
      <div id="charCount">Số ký tự còn lại: 200</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
