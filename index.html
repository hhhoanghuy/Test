<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Category UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="search-bar"></div>

      <div class="grid">
        <div class="card pink">
          <div class="icon">🛋️</div>
          <p>Furniture</p>
        </div>

        <div class="card purple">
          <div class="icon">🏠</div>
          <p>Property</p>
        </div>

        <div class="card gray">
          <div class="icon">🏢</div>
          <p>Job</p>
        </div>

        <div class="card green">
          <div class="icon">✈️</div>
          <p>Travel</p>
        </div>

        <div class="card lightgreen">
          <div class="icon">🚤</div>
        </div>

        <div class="card white">
          <div class="icon">🛵</div>
        </div>
      </div>
    </div>
  </body>
</html>
